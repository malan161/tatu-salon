<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Line — Админ панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      padding-top: 0;
      background: #050505;
    }

    .admin-header {
      background: var(--dark);
      border-bottom: 1px solid var(--border-gray);
      padding: 20px 0;
    }

    .admin-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-header h1 {
      font-size: 18px;
      font-weight: 700;
    }

    .admin-header h1 span {
      color: var(--red);
    }

    .admin-header .back-link {
      color: #888;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.3s;
    }

    .admin-header .back-link:hover {
      color: var(--white);
    }

    .admin-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 73px);
    }

    .admin-sidebar {
      background: var(--dark);
      border-right: 1px solid var(--border-gray);
      padding: 24px;
    }

    .admin-sidebar h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 16px;
    }

    .admin-stats {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stat-item {
      background: var(--card-bg);
      border: 1px solid var(--border-gray);
      border-radius: 12px;
      padding: 16px;
    }

    .stat-item .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 4px;
    }

    .stat-item .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--red);
    }

    .admin-main {
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .admin-main .chat-header-admin {
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-gray);
      margin-bottom: 16px;
    }

    .admin-main .chat-header-admin h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .admin-main .chat-header-admin p {
      color: #888;
      font-size: 14px;
    }

    .admin-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 0;
      max-height: 60vh;
    }

    .admin-msg {
      max-width: 75%;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .admin-msg.client {
      background: var(--card-bg);
      border: 1px solid var(--border-gray);
      align-self: flex-start;
    }

    .admin-msg.admin {
      background: var(--red);
      align-self: flex-end;
    }

    .admin-msg .msg-name {
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .admin-msg.admin .msg-name {
      color: rgba(255,255,255,0.7);
    }

    .admin-msg .msg-time {
      font-size: 10px;
      color: #666;
      margin-top: 6px;
      text-align: right;
    }

    .admin-msg.admin .msg-time {
      color: rgba(255,255,255,0.5);
    }

    .admin-input-wrap {
      display: flex;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--border-gray);
      margin-top: auto;
    }

    .admin-input-wrap input {
      flex: 1;
      padding: 12px 18px;
      border: 1px solid var(--border-gray);
      border-radius: 10px;
      background: var(--dark);
      color: var(--white);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    .admin-input-wrap input:focus {
      border-color: var(--red);
    }

    .admin-input-wrap button {
      padding: 12px 28px;
      background: var(--red);
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    .admin-input-wrap button:hover {
      background: #b91c1c;
    }

    .notification-dot {
      display: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      margin-left: 8px;
      animation: pulse 1.5s infinite;
    }

    .notification-dot.active {
      display: inline-block;
    }

    /* LOGIN OVERLAY */
    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-overlay.hidden {
      display: none;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 48px 36px;
      text-align: center;
    }

    .login-box h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .login-box h1 span {
      color: var(--red);
    }

    .login-box p {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .login-box input {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--border-gray);
      border-radius: 10px;
      background: var(--dark);
      color: var(--white);
      font-size: 16px;
      outline: none;
      font-family: inherit;
      margin-bottom: 16px;
      text-align: center;
      transition: border-color 0.3s;
    }

    .login-box input:focus {
      border-color: var(--red);
    }

    .login-box input::placeholder {
      color: #444;
    }

    .login-box button {
      width: 100%;
      padding: 14px;
      background: var(--red);
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
      font-family: inherit;
    }

    .login-box button:hover {
      background: #b91c1c;
    }

    .login-box button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-error {
      color: var(--red);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .login-error.show {
      display: block;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 768px) {
      .admin-layout {
        grid-template-columns: 1fr;
      }
      .admin-sidebar {
        display: none;
      }
      .login-box {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- LOGIN OVERLAY -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h1>Black <span>Line</span></h1>
      <p>Введите пароль для входа в админ-панель</p>
      <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="off">
      <button id="loginBtn">Войти</button>
      <div class="login-error" id="loginError">Неверный пароль</div>
    </div>
  </div>

  <header class="admin-header">
    <div class="container">
      <h1>Black <span>Line</span> · Админ панель</h1>
      <a href="/" class="back-link">← На сайт</a>
    </div>
  </header>

  <div class="admin-layout" id="adminContent">
    <aside class="admin-sidebar">
      <h3>Статистика</h3>
      <div class="admin-stats">
        <div class="stat-item">
          <div class="stat-label">Всего сообщений</div>
          <div class="stat-value" id="totalMessages">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Новых</div>
          <div class="stat-value" id="newMessages">0</div>
        </div>
      </div>
    </aside>

    <main class="admin-main">
      <div class="chat-header-admin">
        <h2>Чат с клиентами <span class="notification-dot" id="notifDot"></span></h2>
        <p>Отвечайте на сообщения клиентов в реальном времени</p>
      </div>
      <div class="admin-messages" id="adminMessages"></div>
      <div class="admin-input-wrap">
        <input type="text" id="adminInput" placeholder="Ответить клиенту..." maxlength="500">
        <button id="adminSend">Отправить</button>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const STORAGE_KEY = 'bl_admin_token';
    const socket = io();

    // DOM
    const overlay = document.getElementById('loginOverlay');
    const loginPass = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const messagesEl = document.getElementById('adminMessages');
    const inputEl = document.getElementById('adminInput');
    const sendBtn = document.getElementById('adminSend');
    const notifDot = document.getElementById('notifDot');
    const totalEl = document.getElementById('totalMessages');
    const newEl = document.getElementById('newMessages');

    let adminToken = sessionStorage.getItem(STORAGE_KEY);
    let newCount = 0;

    // Check if already logged in
    if (adminToken) {
      verifyToken(adminToken);
    }

    function verifyToken(token) {
      fetch('/api/admin/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token })
      })
      .then(r => r.json())
      .then(data => {
        if (data.valid) {
          overlay.classList.add('hidden');
          authenticateSocket(token);
          loadHistory();
        } else {
          sessionStorage.removeItem(STORAGE_KEY);
          adminToken = null;
        }
      });
    }

    function authenticateSocket(token) {
      socket.emit('adminAuth', token);
    }

    // Login form
    loginBtn.addEventListener('click', function() {
      var pass = loginPass.value.trim();
      if (!pass) return;
      loginBtn.disabled = true;
      loginBtn.textContent = 'Проверка...';

      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass })
      })
      .then(function(r) {
        if (!r.ok) throw new Error('Wrong password');
        return r.json();
      })
      .then(function(data) {
        adminToken = data.token;
        sessionStorage.setItem(STORAGE_KEY, adminToken);
        overlay.classList.add('hidden');
        authenticateSocket(adminToken);
        loadHistory();
      })
      .catch(function() {
        loginError.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';
        loginPass.value = '';
        loginPass.focus();
      });
    });

    loginPass.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loginBtn.click();
    });

    // Admin socket auth result
    socket.on('adminAuthResult', function(data) {
      if (!data.success) {
        sessionStorage.removeItem(STORAGE_KEY);
        adminToken = null;
      }
    });

    // Chat
    function addMessage(data) {
      var div = document.createElement('div');
      div.className = 'admin-msg ' + (data.isAdmin ? 'admin' : 'client');

      var nameDiv = document.createElement('div');
      nameDiv.className = 'msg-name';
      nameDiv.textContent = data.isAdmin ? 'Администратор' : data.name;

      var textDiv = document.createElement('div');
      textDiv.textContent = data.message;

      var timeDiv = document.createElement('div');
      timeDiv.className = 'msg-time';
      timeDiv.textContent = data.timestamp
        ? new Date(data.timestamp).toLocaleString('ru-RU', { hour: '2-digit', minute: '2-digit' })
        : '';

      div.appendChild(nameDiv);
      div.appendChild(textDiv);
      div.appendChild(timeDiv);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function loadHistory() {
      fetch('/api/messages')
        .then(function(r) { return r.json(); })
        .then(function(msgs) {
          messagesEl.innerHTML = '';
          msgs.forEach(addMessage);
          totalEl.textContent = msgs.length;
          var clientMsgs = msgs.filter(function(m) { return !m.isAdmin; });
          newCount = clientMsgs.length;
          newEl.textContent = newCount;
        });
    }

    socket.on('newMessage', function(data) {
      addMessage(data);
      totalEl.textContent = parseInt(totalEl.textContent || 0) + 1;
      if (!data.isAdmin) {
        newCount++;
        newEl.textContent = newCount;
        notifDot.classList.add('active');

        if (Notification.permission === 'granted') {
          new Notification('Black Line — новое сообщение', { body: data.message });
        }

        try {
          var ctx = new (window.AudioContext || window.webkitAudioContext)();
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 800;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
          osc.start();
          osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
      }
    });

    sendBtn.addEventListener('click', function() {
      var text = inputEl.value.trim();
      if (!text) return;
      socket.emit('sendMessage', { name: 'Администратор', message: text, isAdmin: true });
      inputEl.value = '';
    });

    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendBtn.click();
    });

    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    loginPass.focus();
  </script>
</body>
</html>
