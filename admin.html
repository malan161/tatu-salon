<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Line — Админ панель</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050505; color: var(--white); font-family: 'Inter', sans-serif; }

    .admin-header {
      background: var(--dark);
      border-bottom: 1px solid var(--border-gray);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 { font-size: 17px; font-weight: 700; }
    .admin-header h1 span { color: var(--red); }
    .admin-header .back-link { color: #888; text-decoration: none; font-size: 13px; }
    .admin-header .back-link:hover { color: var(--white); }

    .admin-body {
      display: flex;
      height: calc(100vh - 57px);
    }

    /* CONVERSATIONS LIST */
    .conv-list {
      width: 320px;
      flex-shrink: 0;
      background: var(--dark);
      border-right: 1px solid var(--border-gray);
      display: flex;
      flex-direction: column;
    }

    .conv-list-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-gray);
    }
    .conv-list-header h2 { font-size: 14px; font-weight: 600; }
    .conv-list-header h2 span { color: var(--red); }
    .conv-list-header p { font-size: 12px; color: #666; margin-top: 2px; }

    .conv-items {
      flex: 1;
      overflow-y: auto;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.2s;
    }
    .conv-item:hover { background: rgba(255,255,255,0.04); }
    .conv-item.active { background: rgba(220,38,38,0.08); border-left: 3px solid var(--red); }

    .conv-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--border-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-info .conv-name { font-size: 13px; font-weight: 600; }
    .conv-info .conv-preview { font-size: 12px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .conv-meta { text-align: right; flex-shrink: 0; }
    .conv-meta .conv-time { font-size: 11px; color: #555; }
    .conv-meta .conv-badge {
      display: inline-block;
      min-width: 18px;
      height: 18px;
      line-height: 18px;
      border-radius: 9px;
      background: var(--red);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      text-align: center;
      padding: 0 5px;
      margin-top: 4px;
    }
    .conv-meta .conv-badge.hidden { display: none; }

    .conv-empty {
      padding: 40px 20px;
      text-align: center;
      color: #444;
      font-size: 14px;
    }

    /* CHAT PANE */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-pane-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-gray);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-pane-header .back-btn {
      display: none;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
    }
    .chat-pane-header .back-btn:hover { color: var(--white); }
    .chat-pane-header h3 { font-size: 15px; font-weight: 600; }
    .chat-pane-header p { font-size: 12px; color: #666; }

    .chat-pane-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-pane-messages .msg-empty {
      text-align: center;
      color: #444;
      font-size: 14px;
      margin-top: 40px;
    }

    .admin-msg {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .admin-msg.client {
      background: var(--card-bg);
      border: 1px solid var(--border-gray);
      align-self: flex-start;
    }
    .admin-msg.admin {
      background: var(--red);
      align-self: flex-end;
    }
    .admin-msg .msg-name { font-size: 11px; color: #888; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .admin-msg.admin .msg-name { color: rgba(255,255,255,0.7); }
    .admin-msg .msg-time { font-size: 10px; color: #666; margin-top: 6px; text-align: right; }
    .admin-msg.admin .msg-time { color: rgba(255,255,255,0.5); }

    .chat-pane-input {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      border-top: 1px solid var(--border-gray);
      background: var(--dark);
    }
    .chat-pane-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-gray);
      border-radius: 10px;
      background: var(--card-bg);
      color: var(--white);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .chat-pane-input input:focus { border-color: var(--red); }
    .chat-pane-input input::placeholder { color: #555; }
    .chat-pane-input button {
      padding: 12px 24px;
      background: var(--red);
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }
    .chat-pane-input button:hover { background: #b91c1c; }
    .chat-pane-input button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* LOGIN OVERLAY */
    .login-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; align-items: center; justify-content: center;
    }
    .login-overlay.hidden { display: none; }
    .login-box {
      width: 100%; max-width: 400px; padding: 48px 36px; text-align: center;
    }
    .login-box h1 { font-size: 28px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .login-box h1 span { color: var(--red); }
    .login-box p { color: #666; font-size: 14px; margin-bottom: 32px; }
    .login-box input {
      width: 100%; padding: 14px 18px; border: 1px solid var(--border-gray);
      border-radius: 10px; background: var(--dark); color: var(--white);
      font-size: 16px; outline: none; font-family: inherit; margin-bottom: 16px;
      text-align: center; transition: border-color 0.3s;
    }
    .login-box input:focus { border-color: var(--red); }
    .login-box input::placeholder { color: #444; }
    .login-box button {
      width: 100%; padding: 14px; background: var(--red); border: none;
      border-radius: 10px; color: var(--white); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.3s; font-family: inherit;
    }
    .login-box button:hover { background: #b91c1c; }
    .login-box button:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 12px; display: none; }
    .login-error.show { display: block; }

    @media (max-width: 768px) {
      .conv-list { width: 100%; }
      .conv-list.hidden-mobile { display: none; }
      .chat-pane.hidden-mobile { display: none; }
      .chat-pane-header .back-btn { display: block; }
      .chat-pane-messages { padding: 16px; }
      .chat-pane-input { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN OVERLAY -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h1>Black <span>Line</span></h1>
      <p>Введите пароль для входа в админ-панель</p>
      <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="off">
      <button id="loginBtn">Войти</button>
      <div class="login-error" id="loginError">Неверный пароль</div>
    </div>
  </div>

  <header class="admin-header">
    <h1>Black <span>Line</span> · Админ панель</h1>
    <a href="/" class="back-link">← На сайт</a>
  </header>

  <div class="admin-body" id="adminBody">
    <!-- CONVERSATIONS -->
    <div class="conv-list" id="convList">
      <div class="conv-list-header">
        <h2><span>●</span> Диалоги</h2>
        <p id="statsText">Нет сообщений</p>
      </div>
      <div class="conv-items" id="convItems">
        <div class="conv-empty">Пока нет сообщений</div>
      </div>
    </div>

    <!-- CHAT PANE -->
    <div class="chat-pane hidden-mobile" id="chatPane">
      <div class="chat-pane-header">
        <button class="back-btn" id="backBtn">←</button>
        <div>
          <h3 id="paneTitle">Выберите диалог</h3>
          <p id="paneSub">Слева — список клиентов</p>
        </div>
      </div>
      <div class="chat-pane-messages" id="paneMessages">
        <div class="msg-empty">Выберите диалог, чтобы просмотреть сообщения</div>
      </div>
      <div class="chat-pane-input">
        <input type="text" id="adminInput" placeholder="Напишите ответ..." maxlength="500" disabled>
        <button id="adminSend" disabled>Отправить</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    var STORAGE_KEY = 'bl_admin_token';
    var socket = io();

    // DOM
    var overlay = document.getElementById('loginOverlay');
    var loginPass = document.getElementById('loginPassword');
    var loginBtn = document.getElementById('loginBtn');
    var loginError = document.getElementById('loginError');
    var convItems = document.getElementById('convItems');
    var paneMessages = document.getElementById('paneMessages');
    var paneTitle = document.getElementById('paneTitle');
    var paneSub = document.getElementById('paneSub');
    var adminInput = document.getElementById('adminInput');
    var adminSend = document.getElementById('adminSend');
    var backBtn = document.getElementById('backBtn');
    var convList = document.getElementById('convList');
    var chatPane = document.getElementById('chatPane');
    var statsText = document.getElementById('statsText');

    var adminToken = sessionStorage.getItem(STORAGE_KEY);
    var selectedClientId = null;
    var allMessages = [];
    var conversations = {}; // clientId -> { messages: [], unread: 0, lastMsg: ... }

    // Check if already logged in
    if (adminToken) {
      verifyToken(adminToken);
    }

    function verifyToken(token) {
      fetch('/api/admin/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.valid) {
          overlay.classList.add('hidden');
          authenticateSocket(token);
          loadAllMessages();
        } else {
          sessionStorage.removeItem(STORAGE_KEY);
          adminToken = null;
        }
      });
    }

    function authenticateSocket(token) {
      socket.emit('adminAuth', token);
    }

    // Login
    loginBtn.addEventListener('click', function() {
      var pass = loginPass.value.trim();
      if (!pass) return;
      loginBtn.disabled = true;
      loginBtn.textContent = 'Проверка...';

      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass })
      })
      .then(function(r) {
        if (!r.ok) throw new Error('Wrong password');
        return r.json();
      })
      .then(function(data) {
        adminToken = data.token;
        sessionStorage.setItem(STORAGE_KEY, adminToken);
        overlay.classList.add('hidden');
        authenticateSocket(adminToken);
        loadAllMessages();
      })
      .catch(function() {
        loginError.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';
        loginPass.value = '';
        loginPass.focus();
      });
    });

    loginPass.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loginBtn.click();
    });

    socket.on('adminAuthResult', function(data) {
      if (!data.success) {
        sessionStorage.removeItem(STORAGE_KEY);
        adminToken = null;
      }
    });

    // --- CONVERSATIONS ---

    function buildConversations(msgs) {
      allMessages = msgs;
      conversations = {};

      msgs.forEach(function(msg) {
        var cid = msg.clientId || 'unknown';
        if (!conversations[cid]) {
          conversations[cid] = { messages: [], unread: 0, lastMsg: null };
        }
        conversations[cid].messages.push(msg);
        conversations[cid].lastMsg = msg;
      });

      renderConversations();
      if (selectedClientId && conversations[selectedClientId]) {
        selectConversation(selectedClientId);
      } else {
        var keys = Object.keys(conversations);
        if (keys.length > 0) {
          selectConversation(keys[0]);
        } else {
          paneMessages.innerHTML = '<div class="msg-empty">Нет сообщений</div>';
          paneTitle.textContent = 'Выберите диалог';
          paneSub.textContent = 'Слева — список клиентов';
          adminInput.disabled = true;
          adminSend.disabled = true;
        }
      }
      updateStats();
    }

    function renderConversations() {
      var keys = Object.keys(conversations);
      if (keys.length === 0) {
        convItems.innerHTML = '<div class="conv-empty">Пока нет сообщений</div>';
        return;
      }

      var html = '';
      keys.forEach(function(cid) {
        var conv = conversations[cid];
        var last = conv.lastMsg;
        var preview = last ? last.message : '';
        var time = last ? formatTime(last.timestamp) : '';
        var unread = conv.unread;
        var isActive = cid === selectedClientId;

        html += '<div class="conv-item' + (isActive ? ' active' : '') + '" data-cid="' + cid + '">'
          + '<div class="conv-avatar">💬</div>'
          + '<div class="conv-info">'
          + '<div class="conv-name">' + cid.slice(0, 8) + '...</div>'
          + '<div class="conv-preview">' + escapeHtml(preview.slice(0, 40)) + '</div>'
          + '</div>'
          + '<div class="conv-meta">'
          + '<div class="conv-time">' + time + '</div>'
          + '<div class="conv-badge' + (unread > 0 ? '' : ' hidden') + '">' + unread + '</div>'
          + '</div>'
          + '</div>';
      });
      convItems.innerHTML = html;

      // Click handler
      convItems.querySelectorAll('.conv-item').forEach(function(el) {
        el.addEventListener('click', function() {
          selectConversation(this.getAttribute('data-cid'));
          // On mobile, show chat pane
          if (window.innerWidth <= 768) {
            convList.classList.add('hidden-mobile');
            chatPane.classList.remove('hidden-mobile');
          }
        });
      });
    }

    function selectConversation(cid) {
      selectedClientId = cid;
      var conv = conversations[cid];
      if (!conv) return;

      // Clear unread
      conv.unread = 0;

      // Update highlight
      convItems.querySelectorAll('.conv-item').forEach(function(el) {
        el.classList.toggle('active', el.getAttribute('data-cid') === cid);
        if (el.getAttribute('data-cid') === cid) {
          var badge = el.querySelector('.conv-badge');
          if (badge) badge.classList.add('hidden');
        }
      });

      // Render messages
      paneMessages.innerHTML = '';
      conv.messages.forEach(function(msg) {
        paneMessages.appendChild(createMessageEl(msg));
      });
      paneMessages.scrollTop = paneMessages.scrollHeight;

      paneTitle.textContent = 'Клиент ' + cid.slice(0, 8) + '...';
      paneSub.textContent = conv.messages.length + ' сообщений';

      adminInput.disabled = false;
      adminSend.disabled = false;
      adminInput.placeholder = 'Ответить клиенту...';
      adminInput.focus();
    }

    function createMessageEl(data) {
      var div = document.createElement('div');
      div.className = 'admin-msg ' + (data.isAdmin ? 'admin' : 'client');

      var nameDiv = document.createElement('div');
      nameDiv.className = 'msg-name';
      nameDiv.textContent = data.isAdmin ? 'Администратор' : data.name;

      var textDiv = document.createElement('div');
      textDiv.textContent = data.message;

      var timeDiv = document.createElement('div');
      timeDiv.className = 'msg-time';
      timeDiv.textContent = data.timestamp ? formatTime(data.timestamp) : '';

      div.appendChild(nameDiv);
      div.appendChild(textDiv);
      div.appendChild(timeDiv);
      return div;
    }

    function addMessageToConv(data) {
      var cid = data.clientId || 'unknown';
      if (!conversations[cid]) {
        conversations[cid] = { messages: [], unread: 0, lastMsg: null };
      }
      conversations[cid].messages.push(data);
      conversations[cid].lastMsg = data;

      if (cid === selectedClientId) {
        paneMessages.appendChild(createMessageEl(data));
        paneMessages.scrollTop = paneMessages.scrollHeight;
        paneSub.textContent = conversations[cid].messages.length + ' сообщений';
      } else {
        conversations[cid].unread = (conversations[cid].unread || 0) + 1;
      }

      renderConversations();
      updateStats();
    }

    function loadAllMessages() {
      fetch('/api/admin/messages', {
        headers: { 'x-admin-token': adminToken }
      })
      .then(function(r) { return r.json(); })
      .then(function(msgs) {
        buildConversations(msgs);
      });
    }

    function updateStats() {
      var total = allMessages.length;
      var clientIds = Object.keys(conversations).length;
      statsText.textContent = clientIds + ' диалогов · ' + total + ' сообщений';
    }

    function formatTime(ts) {
      var d = new Date(ts);
      var now = new Date();
      var opts = d.toDateString() === now.toDateString()
        ? { hour: '2-digit', minute: '2-digit' }
        : { day: 'numeric', month: 'short' };
      return d.toLocaleString('ru-RU', opts);
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Incoming messages
    socket.on('newMessage', function(data) {
      addMessageToConv(data);
    });

    // SEND REPLY
    adminSend.addEventListener('click', function() {
      var text = adminInput.value.trim();
      if (!text || !selectedClientId) return;
      socket.emit('sendMessage', {
        name: 'Администратор',
        message: text,
        isAdmin: true,
        clientId: selectedClientId
      });
      adminInput.value = '';
    });

    adminInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') adminSend.click();
    });

    // Back button (mobile)
    backBtn.addEventListener('click', function() {
      convList.classList.remove('hidden-mobile');
      chatPane.classList.add('hidden-mobile');
    });

    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    loginPass.focus();
  </script>
</body>
</html>
